<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🎮 Tic Tac Toe</h1>

        <div class="players">
            <div class="player-card active" id="player1">Player 1 (X)</div>
            <div class="player-card" id="player2">Player 2 (O)</div>
        </div>

        <p id="status">Player 1's turn (X)</p>

        <div class="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="restartBtn">Restart Game</button>
    </div>

    <div class="result-modal hidden" id="resultModal">
        <div class="result-card">
            <h2 id="resultMessage">Game over</h2>
            <p class="result-hint">Tap below to start a new match.</p>
            <button id="newGameBtn">Play Again</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
